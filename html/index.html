<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact us</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="wrapper">
        <h1>Contact us</h1>
        
        <div class="form-container">
            <form id="contactForm">
                <table>
                    <tr>
                        <td>
                            <label>FIRST NAME</label>
                            <input type="text" id="firstName">
                        </td>
                        <td>
                            <label>LAST NAME</label>
                            <input type="text" id="lastName">
                        </td>
                    </tr>
                    <tr>
                        <td>
                            <label>EMAIL</label>
                            <input type="email" id="email">
                        </td>
                        <td>
                            <label>PHONE NUMBER</label>
                            <input type="tel" id="phone">
                        </td>
                    </tr>
                    <tr>
                        <td colspan="2">
                            <label>WHAT DO YOU HAVE IN MIND</label>
                            <textarea id="message" placeholder="Please enter query.."></textarea>
                        </td>
                    </tr>
                    <tr>
                        <td colspan="2" class="btn-row">
                            <button type="submit">Submit</button>
                        </td>
                    </tr>
                </table>
            </form>
        </div>
    </div>


<form>
<label for = "PatientName"> Patient Name: </label>
<input type = "text" id = "PatientName" name = "PatientName" placeholder = "Enter The Name">
<br><br>

<label for = "Age">Age: </label>
<input type="number" id ="Age" name ="Age">
<br><br>

<label for="DOB">Date of Birth: </label>
<input type="date" id="DOB" name ="DOB">
<br><br>

<input type ="radio" id ="GenderMale" name ="Gender" value = "Male">
<label for="GenderMale">Male</label>
<br><br>

<input type ="radio" id ="GenderFemale" name ="Gender" value = "Female">
<label for="GenderFemale">Female</label>
<br><br>

<label for ="Address">Address:</label>
<textarea id ="Address" name="Address" rows="4" cols ="25" placeholder="Enter The Address"></textarea>
<br><br>

<label for="InsertFile">Patient Medical Records: </label>
<input type="file" id="InsertFile" name ="InsertFile">
<br><br>

<label for ="Doctor">Prefered Doctor List: </label>
<select>
    <option values ="Default">  </option>
    <option values ="Medicine"> Medicine </option>
    <option values ="Cardiac"> Cardiac </option>
    <option values ="Skin"> Skin </option>
</select>
<br><br>
<input type ="submit" id ="submit" name ="submit">
</form>
</body>
</html>
